name: Android CI

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref_name }}" =~ ^v([0-9]+)$ ]]; then
            VERSION_CODE="${BASH_REMATCH[1]}"
            echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
            echo "version_name=$VERSION_CODE.0" >> $GITHUB_OUTPUT
          else
            echo "No es un tag, no se genera APK"
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: |
          gradle assembleDebug \
            -PversionCode=${{ steps.version.outputs.version_code }} \
            -PversionName=${{ steps.version.outputs.version_name }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ steps.version.outputs.version_name }}.apk
          path: app/build/outputs/apk/debug/app-debug.apk