name: Android CI

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref_name }}" =~ ^v([0-9]+)$ ]]; then
            VERSION_CODE="${BASH_REMATCH[1]}"
            echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
            echo "version_name=$VERSION_CODE.0" >> $GITHUB_OUTPUT
          else
            echo "No es un tag, no se genera APK"
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: |
          echo "$RELEASE_KEYSTORE" | base64 -d > app/release.keystore

      - name: Build with Gradle
        run: |
          gradle assembleRelease \
            -PversionCode=${{ steps.version.outputs.version_code }} \
            -PversionName=${{ steps.version.outputs.version_name }} \
            -PKEYSTORE_PATH=app/release.keystore \
            -PKEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }} \
            -PKEYSTORE_ALIAS=${{ secrets.KEYSTORE_ALIAS }} \
            || gradle assembleDebug \
            -PversionCode=${{ steps.version.outputs.version_code }} \
            -PversionName=${{ steps.version.outputs.version_name }}

      - name: List APK outputs
        run: |
          echo "=== Release dir ==="
          ls -laR app/build/outputs/apk/release/
          echo "=== Debug dir ==="
          ls -laR app/build/outputs/apk/debug/

      - name: Prepare APK
        run: |
          if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
            cp app/build/outputs/apk/release/app-release.apk app-output.apk
          elif [ -f "app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk app-output.apk
          elif [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            cp app/build/outputs/apk/debug/app-debug.apk app-output.apk
          else
            echo "No APK found!"
            ls -la app/build/outputs/apk/
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ steps.version.outputs.version_name }}.apk
          path: app-output.apk